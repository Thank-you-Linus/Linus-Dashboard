name: "E2E Diagnostics"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  e2e:
    name: "Playwright E2E"
    runs-on: "ubuntu-latest"
    timeout-minutes: 20

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Set up Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: "Install dependencies"
        run: npm ci

      - name: "Build dashboard bundle"
        run: npm run build

      - name: "Install Playwright browsers"
        run: npx playwright install --with-deps chromium

      - name: "Run Playwright E2E tests"
        run: npm run test:e2e

      - name: "Upload Playwright HTML report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: "Upload Playwright failure artifacts"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: test-results/
          retention-days: 7

      - name: "Post PR artifact summary"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const wanted = new Set(['playwright-report', 'playwright-failure-artifacts']);
            const relevantArtifacts = artifacts.artifacts.filter((artifact) => wanted.has(artifact.name));
            const artifactLines = relevantArtifacts.length
              ? relevantArtifacts.map((artifact) => `- [${artifact.name}](${artifact.archive_download_url})`)
              : ['- No Playwright artifacts were uploaded'];

            const body = `## 🎥 Playwright E2E artifacts\n\n` +
              `These tests exercise the dashboard generation against the versioned HA fixture.\n\n` +
              `### What is covered\n` +
              `- dashboard generation completes without errors\n` +
              `- entity ↔ area ↔ floor mappings stay valid\n` +
              `- generated views exist for every area and floor\n` +
              `- the visible summary matches the fixture counts\n\n` +
              `### Artifacts\n` +
              `${artifactLines.join('\n')}\n\n` +
              `### What to inspect\n` +
              `- **playwright-report**: HTML report for the run\n` +
              `- **playwright-failure-artifacts**: screenshots, videos, and traces when a failure occurs\n\n` +
              `### Workflow run\n` +
              `- [Open the full GitHub Actions run](${context.payload.repository.html_url}/actions/runs/${context.runId})\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 🎥 Playwright E2E artifacts';
            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
