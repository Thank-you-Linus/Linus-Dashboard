# ─────────────────────────────────────────────
# COVERS (volets)
# ─────────────────────────────────────────────
cover:
  - platform: template
    covers:
      volet_salon:
        friendly_name: "Volet Salon"
        unique_id: "fake_cover_salon"
        device_class: "shutter"
        value_template: "{{ is_state('input_boolean.fake_salon_volet', 'on') }}"
        open_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_salon_volet
        close_cover:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.fake_salon_volet
        stop_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_salon_volet
        position_template: "{{ 100 if is_state('input_boolean.fake_salon_volet', 'on') else 0 }}"
      volet_chambre:
        friendly_name: "Volet Chambre"
        unique_id: "fake_cover_chambre"
        device_class: "shutter"
        value_template: "{{ is_state('input_boolean.fake_chambre_volet', 'on') }}"
        open_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_chambre_volet
        close_cover:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.fake_chambre_volet
        stop_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_chambre_volet
        position_template: "{{ 100 if is_state('input_boolean.fake_chambre_volet', 'on') else 0 }}"
      volet_cuisine:
        friendly_name: "Volet Cuisine"
        unique_id: "fake_cover_cuisine"
        device_class: "shutter"
        value_template: "{{ is_state('input_boolean.fake_cuisine_volet', 'on') }}"
        open_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_cuisine_volet
        close_cover:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.fake_cuisine_volet
        stop_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_cuisine_volet
        position_template: "{{ 100 if is_state('input_boolean.fake_cuisine_volet', 'on') else 0 }}"
      volet_bureau:
        friendly_name: "Volet Bureau"
        unique_id: "fake_cover_bureau"
        device_class: "shutter"
        value_template: "{{ is_state('input_boolean.fake_bureau_volet', 'on') }}"
        open_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_bureau_volet
        close_cover:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.fake_bureau_volet
        stop_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_bureau_volet
        position_template: "{{ 100 if is_state('input_boolean.fake_bureau_volet', 'on') else 0 }}"
      # device_class: gate / garage — neither existed before; both were
      # falling back to the generic "Opening"/"Ouverture" name (this
      # session's bug report) instead of "Portail"/"Garage".
      portail:
        friendly_name: "Portail"
        unique_id: "fake_cover_portail"
        device_class: "gate"
        value_template: "{{ is_state('input_boolean.fake_entree_portail', 'on') }}"
        open_cover:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_entree_portail
