        data:
          option: "idle"
      turn_off:
        action: input_select.select_option
        target:
          entity_id: input_select.fake_chambre_speaker
        data:
          option: "off"
  - platform: universal
    name: "Ecran Bureau"
    unique_id: "fake_mp_ecran_bureau"
    device_class: "tv"
    state_template: "{{ states('input_select.fake_bureau_screen') }}"
    commands:
      turn_on:
        action: input_select.select_option
        target:
          entity_id: input_select.fake_bureau_screen
        data:
          option: "idle"
