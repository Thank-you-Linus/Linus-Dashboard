# ─────────────────────────────────────────────
# CLIMATE (generic_thermostat)
# ─────────────────────────────────────────────
climate:
  - platform: generic_thermostat
    name: "Thermostat Salon"
    unique_id: "fake_climate_salon"
    heater: input_boolean.fake_salon_heater
    target_sensor: sensor.temperature_salon
    min_temp: 16
    max_temp: 26
    target_temp: 21
    cold_tolerance: 0.5
    hot_tolerance: 0.5
  - platform: generic_thermostat
    name: "Thermostat Chambre"
    unique_id: "fake_climate_chambre"
    heater: input_boolean.fake_chambre_heater
    target_sensor: sensor.temperature_chambre
    min_temp: 16
    max_temp: 26
    target_temp: 19
    cold_tolerance: 0.5
    hot_tolerance: 0.5

