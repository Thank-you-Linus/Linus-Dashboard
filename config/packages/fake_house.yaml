# Fake house for Linus Dashboard testing
# Covers all domains that Magic Areas and Linus Dashboard use

# ─────────────────────────────────────────────
# BACKING ENTITIES (input_boolean / input_number / input_select)
# ─────────────────────────────────────────────
input_boolean:
  # Lights
  # NOTE: every entry below needs a non-empty mapping (`initial: off`, not a
  # bare key) — HA's package merger silently drops entries that parse as
  # YAML null/empty-dict when merging config/packages/*.yaml, which was
  # making all 21 of these (and the lights/covers/fans/climate depending on
  # them) never actually get created (unavailable at startup).
  fake_salon_principal:
    initial: off
  fake_salon_deco:
    initial: off
  fake_salon_lampe:
    initial: off
  fake_chambre:
    initial: off
  fake_chambre_chevet:
    initial: off
  fake_cuisine:
    initial: off
  fake_cuisine_plan:
    initial: off
  fake_bureau:
    initial: off
  fake_bureau_bureau:
    initial: off
  fake_salle_de_bain:
    initial: off
  fake_entree:
    initial: off
  # Covers (backing)
  fake_salon_volet:
    initial: off
  fake_chambre_volet:
    initial: off
  fake_cuisine_volet:
    initial: off
  fake_bureau_volet:
    initial: off
  # Covers with a non-shutter device_class — exercises the
  # getDomainTranslationKey device_class label bug (gate/garage were falling
  # back to the generic "Opening"/"Ouverture" name instead of "Portail"/
  # "Garage").
  fake_entree_portail:
    initial: off
  fake_entree_garage:
    initial: off
  # Fans (backing)
  fake_bureau_fan:
    initial: off
  fake_sdb_fan:
    initial: off
  # Climate heaters (backing for generic_thermostat)
  fake_salon_heater:
    initial: off
  fake_chambre_heater:
    initial: off
  # Switches
  fake_cuisine_lave_vaisselle:
    initial: off
  fake_cuisine_hotte:
    initial: off

input_number:
  # Fan speeds
  fake_bureau_fan_speed:
    min: 0
    max: 100
    step: 25
    initial: 0
  fake_sdb_fan_speed:
    min: 0
    max: 100
    step: 25
    initial: 0
  # Light brightness — every other fake light is plain on/off, which meant
  # the light group's brightness/color aggregation (light.py) had nothing to
  # aggregate in this test environment. salon_principal gets a real
  # brightness_template so that path is actually exercised, not just
  # code-reviewed.
  fake_salon_principal_brightness:
    min: 0
    max: 255
    step: 1
    initial: 180

input_select:
  # Media players
  fake_salon_tv:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"
  fake_salon_speaker:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"
  fake_chambre_speaker:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"
  fake_bureau_screen:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"
  # device_class: receiver — no existing media_player exercises this class
  fake_salon_ampli:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"

# ─────────────────────────────────────────────
# TEMPLATE ENTITIES
# ─────────────────────────────────────────────
template:
  - light:
      # SALON
      - name: "Salon Principal"
        unique_id: "fake_light_salon_principal"
        state: "{{ is_state('input_boolean.fake_salon_principal', 'on') }}"
        level: "{{ states('input_number.fake_salon_principal_brightness') | int }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_salon_principal
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_salon_principal
        # HA's template light calls set_level *instead of* turn_on when
        # brightness is passed to turn_on (not both) — set_level is fully
        # responsible for turning the light on in that case, turn_on above
        # only ever runs for a bare on/off call.
        set_level:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_salon_principal
          - action: input_number.set_value
            target:
              entity_id: input_number.fake_salon_principal_brightness
            data:
              value: "{{ brightness }}"
      - name: "Salon Deco"
        unique_id: "fake_light_salon_deco"
        state: "{{ is_state('input_boolean.fake_salon_deco', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_salon_deco
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_salon_deco
      - name: "Salon Lampe"
        unique_id: "fake_light_salon_lampe"
        state: "{{ is_state('input_boolean.fake_salon_lampe', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_salon_lampe
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_salon_lampe
      # CHAMBRE
      - name: "Chambre Lumiere"
        unique_id: "fake_light_chambre"
        state: "{{ is_state('input_boolean.fake_chambre', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_chambre
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_chambre
      - name: "Chambre Chevet"
        unique_id: "fake_light_chambre_chevet"
        state: "{{ is_state('input_boolean.fake_chambre_chevet', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_chambre_chevet
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_chambre_chevet
      # CUISINE
      - name: "Cuisine Lumiere"
        unique_id: "fake_light_cuisine"
        state: "{{ is_state('input_boolean.fake_cuisine', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_cuisine
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_cuisine
      - name: "Cuisine Plan de Travail"
        unique_id: "fake_light_cuisine_plan"
        state: "{{ is_state('input_boolean.fake_cuisine_plan', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_cuisine_plan
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_cuisine_plan
      # BUREAU
      - name: "Bureau Lumiere"
        unique_id: "fake_light_bureau"
        state: "{{ is_state('input_boolean.fake_bureau', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_bureau
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_bureau
      - name: "Bureau Lampe de Bureau"
        unique_id: "fake_light_bureau_bureau"
        state: "{{ is_state('input_boolean.fake_bureau_bureau', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_bureau_bureau
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_bureau_bureau
      # SALLE DE BAIN
      - name: "Salle de Bain"
        unique_id: "fake_light_salle_de_bain"
        state: "{{ is_state('input_boolean.fake_salle_de_bain', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_salle_de_bain
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_salle_de_bain
      # ENTREE
      - name: "Entree Lumiere"
        unique_id: "fake_light_entree"
        state: "{{ is_state('input_boolean.fake_entree', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_entree
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_entree

# NOTE: temperature/humidity/illuminance sensors and motion/door binary_sensors
# are provisioned as native HA "Random" helper entities (config_entries), not
# templates, so they generate real random values on their own poll cycle.
# Areas, floors and all entity->area assignments (for this whole package) are
# also provisioned outside of YAML since they're runtime registry state.
# Run config/setup_fake_house_full.py once after first boot to set it all up.

# ─────────────────────────────────────────────
# MEDIA PLAYERS (universal platform)
# ─────────────────────────────────────────────
media_player:
  - platform: universal
    name: "TV Salon"
    unique_id: "fake_mp_tv_salon"
    device_class: "tv"
    state_template: "{{ states('input_select.fake_salon_tv') }}"
    commands:
      turn_on:
        action: input_select.select_option
        target:
          entity_id: input_select.fake_salon_tv
        data:
          option: "idle"
      turn_off:
        action: input_select.select_option
        target:
          entity_id: input_select.fake_salon_tv
        data:
          option: "off"
  - platform: universal
    name: "Enceinte Salon"
    unique_id: "fake_mp_enceinte_salon"
    device_class: "speaker"
    state_template: "{{ states('input_select.fake_salon_speaker') }}"
