            value: "{{ percentage }}"
      extraction_sdb:
        friendly_name: "Extraction Salle de Bain"
        unique_id: "fake_fan_sdb"
        value_template: "{{ is_state('input_boolean.fake_sdb_fan', 'on') }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_sdb_fan
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.fake_sdb_fan
        percentage_template: "{{ states('input_number.fake_sdb_fan_speed') | int }}"
