# Fake house for Linus Dashboard testing
# Covers all domains that Magic Areas and Linus Dashboard use

# ─────────────────────────────────────────────
# BACKING ENTITIES (input_boolean / input_number / input_select)
# ─────────────────────────────────────────────
input_boolean:
  # Lights
  fake_salon_principal:
  fake_salon_deco:
  fake_salon_lampe:
  fake_chambre:
  fake_chambre_chevet:
  fake_cuisine:
  fake_cuisine_plan:
  fake_bureau:
  fake_bureau_bureau:
  fake_salle_de_bain:
  fake_entree:
  # Covers (backing)
  fake_salon_volet:
  fake_chambre_volet:
  fake_cuisine_volet:
  fake_bureau_volet:
  # Fans (backing)
  fake_bureau_fan:
  fake_sdb_fan:
  # Climate heaters (backing for generic_thermostat)
  fake_salon_heater:
  fake_chambre_heater:
  # Switches
  fake_cuisine_lave_vaisselle:
  fake_cuisine_hotte:

input_number:
  # Fan speeds
  fake_bureau_fan_speed:
    min: 0
    max: 100
    step: 25
    initial: 0
  fake_sdb_fan_speed:
    min: 0
    max: 100
    step: 25
    initial: 0

input_select:
  # Media players
  fake_salon_tv:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"
  fake_salon_speaker:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"
  fake_chambre_speaker:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"
  fake_bureau_screen:
    options: ["off", "idle", "playing", "paused"]
    initial: "off"

# ─────────────────────────────────────────────
# TEMPLATE ENTITIES
# ─────────────────────────────────────────────
template:
  - light:
      # SALON
      - name: "Salon Principal"
        unique_id: "fake_light_salon_principal"
        state: "{{ is_state('input_boolean.fake_salon_principal', 'on') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.fake_salon_principal
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.fake_salon_principal
      - name: "Salon Deco"
        unique_id: "fake_light_salon_deco"
        state: "{{ is_state('input_boolean.fake_salon_deco', 'on') }}"
