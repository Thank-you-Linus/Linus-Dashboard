            entity_id: input_boolean.fake_cuisine_lave_vaisselle
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.fake_cuisine_lave_vaisselle
      hotte_cuisine:
        friendly_name: "Hotte Cuisine"
        unique_id: "fake_switch_hotte_cuisine"
        value_template: "{{ is_state('input_boolean.fake_cuisine_hotte', 'on') }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_cuisine_hotte
        turn_off:
