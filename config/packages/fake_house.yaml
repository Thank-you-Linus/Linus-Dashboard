      turn_on:
        action: input_select.select_option
        target:
          entity_id: input_select.fake_salon_speaker
        data:
          option: "idle"
      turn_off:
        action: input_select.select_option
        target:
          entity_id: input_select.fake_salon_speaker
        data:
          option: "off"
  - platform: universal
