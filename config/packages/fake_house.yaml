    fans:
      ventilateur_bureau:
        friendly_name: "Ventilateur Bureau"
        unique_id: "fake_fan_bureau"
        value_template: "{{ is_state('input_boolean.fake_bureau_fan', 'on') }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.fake_bureau_fan
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.fake_bureau_fan
        percentage_template: "{{ states('input_number.fake_bureau_fan_speed') | int }}"
        set_percentage:
          action: input_number.set_value
          target:
            entity_id: input_number.fake_bureau_fan_speed
